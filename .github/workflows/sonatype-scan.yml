name: Sonatype Security Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sonatype Lifecycle Evaluation
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: ${{ secrets.SONATYPE_IQ_URL }}
          username: ${{ secrets.SONATYPE_USER }}
          password: ${{ secrets.SONATYPE_PASSWORD }}
          application-id: che-code
          scan-targets: |
            package.json
            launcher/package.json
            code/package.json
            code/remote/package.json
            code/remote/web/package.json
            code/build/package.json
            code/build/npm/gyp/package.json
            code/extensions/**/package.json
            code/test/**/package.json
          upload-sarif-file: true
          ignore-system-errors: true
